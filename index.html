<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pamodzi Pay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #fff;
  }

  /* card */
  .card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 36px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }

  /* logo */
  .logo {
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 20px;
    box-shadow: 0 0 28px rgba(108,99,255,0.6);
    animation: glow 3s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 20px rgba(108,99,255,0.5); }
    to   { box-shadow: 0 0 40px rgba(0,212,170,0.7); }
  }

  h1 { text-align: center; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 28px; }

  /* fields */
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 7px; letter-spacing: 0.6px; text-transform: uppercase; }
  input {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: #fff; font-family: inherit; font-size: 16px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.25); }
  input::placeholder { color: rgba(255,255,255,0.25); }

  .hint { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 5px; }

  /* button */
  .pay-btn {
    width: 100%; margin-top: 8px; padding: 15px;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    border: none; border-radius: 14px;
    color: #fff; font-family: inherit; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 6px 24px rgba(108,99,255,0.5);
  }
  .pay-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(108,99,255,0.6); }
  .pay-btn:active:not(:disabled) { transform: translateY(0); }
  .pay-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  /* spinner */
  .spin {
    width: 20px; height: 20px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    display: none; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* status area */
  #status-area {
    display: none; margin-top: 24px;
    text-align: center;
  }
  #status-area.show { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* big spinner */
  .big-spin {
    width: 48px; height: 48px; margin: 0 auto 14px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: #6c63ff;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }

  /* countdown circle */
  .cd-wrap { position: relative; width: 72px; height: 72px; margin: 0 auto 14px; display: none; }
  .cd-svg { width: 72px; height: 72px; transform: rotate(-90deg); }
  .cd-track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
  .cd-ring  { fill: none; stroke: #00d4aa; stroke-width: 5; stroke-linecap: round;
    stroke-dasharray: 200; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
  .cd-num { position: absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size: 24px; font-weight: 800; color: #00d4aa; }

  #status-label { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
  #status-sub   { font-size: 12px; color: rgba(255,255,255,0.45); }

  /* receipt */
  #receipt-area { display: none; margin-top: 20px; animation: fadeUp 0.4s ease; }
  #receipt-area.show { display: block; }
  .receipt-box {
    background: rgba(0,0,0,0.35);
    border: 1px dashed rgba(108,99,255,0.4);
    border-radius: 14px; padding: 18px;
    font-family: 'Courier New', monospace;
    font-size: 13px; line-height: 1.9;
    position: relative; overflow: hidden;
  }
  .receipt-box::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:linear-gradient(90deg,#6c63ff,#00d4aa,#ffd166,#ff6b6b); }
  .r-title { font-size:10px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; }
  .r-body  { white-space:pre-wrap; word-break:break-all; color:#00d4aa; }
  .r-foot  { margin-top:10px; padding-top:10px; border-top:1px dashed rgba(255,255,255,0.1); font-size:10px; color:rgba(255,255,255,0.3); text-align:center; }
  .ls { color: #00d4aa; } .le { color: #ff6b6b; } .ln { color: #ffd166; }

  .copy-btn {
    width:100%; margin-top:10px; padding:10px;
    background:rgba(108,99,255,0.15); border:1px solid rgba(108,99,255,0.3);
    border-radius:10px; color:#a5a0ff; font-family:inherit; font-size:13px; font-weight:600;
    cursor:pointer; transition:background 0.2s;
  }
  .copy-btn:hover { background:rgba(108,99,255,0.28); }

  /* POPUP */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 999;
    align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(8px);
  }
  .overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .popup {
    background: #1a1a2e; border-radius: 22px;
    padding: 36px 28px 28px; max-width: 360px; width: 100%;
    text-align: center; border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 28px 72px rgba(0,0,0,0.7);
    animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from{transform:scale(0.75);opacity:0} to{transform:scale(1);opacity:1} }
  .p-icon  { font-size: 60px; margin-bottom: 14px; display: block; }
  .p-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .p-title.ok  { color: #00d4aa; }
  .p-title.bad { color: #ff6b6b; }
  .p-msg   { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.7; margin-bottom: 24px; word-break: break-word; }
  .p-btn {
    width:100%; padding:13px; border:none; border-radius:12px;
    font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;
  }
  .p-btn.ok  { background:rgba(0,212,170,0.15); color:#00d4aa; border:1px solid rgba(0,212,170,0.35); }
  .p-btn.bad { background:rgba(255,107,107,0.15); color:#ff6b6b; border:1px solid rgba(255,107,107,0.35); }
</style>
</head>
<body>

<!-- Popup -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closePopup()">
  <div class="popup">
    <span class="p-icon" id="p-icon"></span>
    <div class="p-title" id="p-title"></div>
    <div class="p-msg"   id="p-msg"></div>
    <button class="p-btn" id="p-btn" onclick="closePopup()">OK</button>
  </div>
</div>

<!-- Card -->
<div class="card">
  <div class="logo">💳</div>
  <h1>Pamodzi Pay</h1>
  <p class="sub">Zambia Mobile Money — Sandbox</p>

  <div class="field">
    <label>Phone Number</label>
    <input id="phone" type="tel" placeholder="260976543210" maxlength="12" inputmode="numeric" />
    <div class="hint">Start with 260 — 12 digits, no spaces</div>
  </div>

  <div class="field">
    <label>Amount (ZMW)</label>
    <input id="amount" type="number" placeholder="0.00" min="1" step="0.01" inputmode="decimal" />
  </div>

  <button class="pay-btn" id="pay-btn" onclick="pay()">
    <div class="spin" id="btn-spin"></div>
    <span id="btn-text">Pay Now</span>
  </button>

  <!-- Status -->
  <div id="status-area">
    <div class="big-spin" id="big-spin"></div>
    <div class="cd-wrap" id="cd-wrap">
      <svg class="cd-svg" viewBox="0 0 64 64">
        <circle class="cd-track" cx="32" cy="32" r="28"/>
        <circle class="cd-ring"  id="cd-ring"  cx="32" cy="32" r="28"/>
      </svg>
      <div class="cd-num" id="cd-num">7</div>
    </div>
    <div id="status-label">Sending STK push…</div>
    <div id="status-sub">Please wait</div>
  </div>

  <!-- Receipt -->
  <div id="receipt-area">
    <div class="receipt-box">
      <div class="r-title">📄 Receipt</div>
      <div class="r-body" id="r-body"></div>
      <div class="r-foot">Pamodzi Gateway · Sandbox</div>
    </div>
    <button class="copy-btn" onclick="copyR()">📋 Copy Receipt</button>
  </div>
</div>

<script>
  const BASE = "https://stk-push-test.onrender.com";
  let cdTimer = null;

  // auto-format phone
  document.getElementById('phone').addEventListener('input', function(){
    let v = this.value.replace(/\D/g,'');
    if (v.startsWith('0')) v = '260' + v.slice(1);
    if (v.length && !v.startsWith('260')) v = '260' + v;
    this.value = v.slice(0,12);
  });

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showPopup(ok, title, msg){
    document.getElementById('p-icon').textContent = ok ? '✅' : '❌';
    const t = document.getElementById('p-title');
    t.textContent = title; t.className = 'p-title '+(ok?'ok':'bad');
    document.getElementById('p-msg').textContent = msg;
    const b = document.getElementById('p-btn');
    b.className = 'p-btn '+(ok?'ok':'bad');
    document.getElementById('overlay').classList.add('show');
  }
  function closePopup(){ document.getElementById('overlay').classList.remove('show'); }

  function setBusy(on){
    document.getElementById('pay-btn').disabled = on;
    document.getElementById('btn-spin').style.display = on ? 'block' : 'none';
    document.getElementById('btn-text').textContent = on ? 'Processing…' : 'Pay Now';
  }

  function setStatus(label, sub){
    document.getElementById('status-label').textContent = label;
    document.getElementById('status-sub').textContent   = sub;
  }

  function showReceipt(text){
    const body = document.getElementById('r-body');
    body.innerHTML = text.split('\n').map(line => {
      if (/SUCCESS|OT001/i.test(line)) return `<span class="ls">${esc(line)}</span>`;
      if (/FAILED|ERROR|OT002|OT099/i.test(line)) return `<span class="le">${esc(line)}</span>`;
      if (/Txn|Amount|Phone|Time|Initiate|Verify/i.test(line)) return `<span class="ln">${esc(line)}</span>`;
      return esc(line);
    }).join('\n');
    document.getElementById('receipt-area').classList.add('show');
  }

  function copyR(){
    navigator.clipboard.writeText(document.getElementById('r-body').innerText)
      .then(()=>alert('Receipt copied!'))
      .catch(()=>alert('Please copy manually.'));
  }

  function startCountdown(secs, done){
    const ring    = document.getElementById('cd-ring');
    const numEl   = document.getElementById('cd-num');
    const bigSpin = document.getElementById('big-spin');
    const cdWrap  = document.getElementById('cd-wrap');
    const circ    = 2 * Math.PI * 28; // r=28

    ring.style.strokeDasharray  = circ;
    ring.style.strokeDashoffset = 0;
    bigSpin.style.display = 'none';
    cdWrap.style.display  = 'block';
    numEl.textContent = secs;
    setStatus('STK push sent!', 'Customer sees a prompt on their phone…');

    let left = secs;
    cdTimer = setInterval(()=>{
      left--;
      numEl.textContent = left;
      ring.style.strokeDashoffset = circ * (1 - left/secs);
      if (left <= 0){
        clearInterval(cdTimer);
        cdWrap.style.display  = 'none';
        bigSpin.style.display = 'block';
        setStatus('Verifying payment…', 'Checking with Pamodzi Gateway');
        done();
      }
    }, 1000);
  }

  async function pay(){
    const phone  = document.getElementById('phone').value.trim();
    const amount = document.getElementById('amount').value.trim();

    if (!/^260\d{9}$/.test(phone)){ showPopup(false,'Invalid Phone','Phone must start with 260 and be 12 digits.\nExample: 260976543210'); return; }
    if (!amount || parseFloat(amount) <= 0){ showPopup(false,'Invalid Amount','Please enter an amount greater than 0.'); return; }

    // reset
    document.getElementById('receipt-area').classList.remove('show');
    document.getElementById('big-spin').style.display = 'block';
    document.getElementById('cd-wrap').style.display  = 'none';
    document.getElementById('status-area').classList.add('show');
    setStatus('Sending STK push…','Contacting Pamodzi Gateway');
    setBusy(true);

    let initText = '';
    let txnId    = '';

    try {
      const res = await fetch(`${BASE}/initiate`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ phoneNumber: phone, amount: parseFloat(amount), narration: 'Payment' })
      });
      initText = await res.text();

      // extract txn id — check formatted line first, then dig into raw JSON
      const mLine = initText.match(/Txn ID\s*:\s*(\S+)/i);
      if (mLine) {
        txnId = mLine[1];
      } else {
        // Pamodzi nests it as paymentsResponse.transationId (their typo)
        const mJson = initText.match(/"transationId"\s*:\s*"([^"]+)"/i)
                   || initText.match(/"transactionId"\s*:\s*"([^"]+)"/i)
                   || initText.match(/"internalTransactionId"\s*:\s*"([^"]+)"/i)
                   || initText.match(/(TNX[A-Z0-9]+)/i);
        if (mJson) txnId = mJson[1];
      }

      if (!res.ok || /^ERROR/i.test(initText.trim())){
        document.getElementById('status-area').classList.remove('show');
        setBusy(false);
        showReceipt(initText);
        const detail = initText.replace(/^ERROR[:\s]*/i,'').trim();
        showPopup(false, 'STK Push Failed', detail || 'Gateway rejected the request. Check the number and try again.');
        return;
      }

      // Start 7-second countdown then verify
      startCountdown(7, async ()=>{
        try {
          let verifyText = '';
          if (txnId){
            const vr = await fetch(`${BASE}/verify?txnId=${encodeURIComponent(txnId)}&phoneNumber=${encodeURIComponent(phone)}`);
            verifyText = await vr.text();
          } else {
            verifyText = 'Could not extract Transaction ID from initiation response.';
          }

          document.getElementById('status-area').classList.remove('show');
          setBusy(false);

          const combined = initText.trim() + '\n\n--- VERIFICATION ---\n' + verifyText.trim();
          showReceipt(combined);

          if (/SUCCESS/i.test(verifyText)){
            showPopup(true, 'Payment Successful!',
              `ZMW ${parseFloat(amount).toFixed(2)} received from ${phone}.\nTxn: ${txnId || 'see receipt'}`);
          } else {
            const errLine = verifyText.split('\n').find(l=>/failed|error|OT002|OT099/i.test(l)) || verifyText;
            const detail  = errLine.replace(/^(FAILED|ERROR)[:\s]*/i,'').trim();
            showPopup(false, 'Payment Failed',
              detail || 'Payment not completed. Customer may have cancelled, timed out, or had insufficient funds.');
          }
        } catch(e){
          document.getElementById('status-area').classList.remove('show');
          setBusy(false);
          showReceipt(initText + '\n\nVERIFY ERROR: ' + e.message);
          showPopup(false,'Verification Error', e.message || 'Could not verify the payment.');
        }
      });

    } catch(e){
      clearInterval(cdTimer);
      document.getElementById('status-area').classList.remove('show');
      setBusy(false);
      const msg = e.message || 'Could not reach the server.';
      showReceipt('ERROR: ' + msg);
      showPopup(false,'Connection Error', msg + '\n\nMake sure the server is running on Render.');
    }
  }
</script>
</body>
</html>
